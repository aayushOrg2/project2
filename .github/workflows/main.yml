name: "Master Pipeline"

on:
  workflow_dispatch:
    inputs:    
      action:
        description: "Choose action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - sit
          - production
      working_directory:
        description: "Terraform Folder"
        required: false
        default: "."
        type: string

permissions:
  id-token: write
  contents: read
  actions: read

jobs:  
  validate-access:
    name: "Validate Branch & Env"
    runs-on: ubuntu-latest
    steps:
      - name: Check Match
        shell: bash
        run: |
          BRANCH=$(echo "${{ github.head_ref || github.ref_name }}" | tr '[:upper:]' '[:lower:]')
          ENV="${{ inputs.environment }}"
          VALID=false

          echo "Validating: Branch='$BRANCH', Env='$ENV'"

          if [[ "$BRANCH" == "main" && "$ENV" == "production" ]]; then
            VALID=true
          elif [[ "$BRANCH" =~ ^(dev|develop)$ && "$ENV" == "dev" ]]; then
            VALID=true
          elif [[ "$BRANCH" == feat/* && "$ENV" == "sit" ]]; then
            VALID=true
          fi

          if [[ "$VALID" == false ]]; then
            echo "::error::Access Denied: Branch '$BRANCH' is not allowed to deploy to '$ENV'."
            exit 1
          fi
          echo "Validation Passed."
  
  tflint:
    needs: validate-access
    uses: aayuORG1/project1/.github/workflows/docker-tflint.yml@main
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

  tfsec:
    needs: validate-access
    uses: aayuORG1/project1/.github/workflows/docker-tfsec.yml@main
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

  tftest:
    needs: validate-access
    uses: aayuORG1/project1/.github/workflows/docker-tftest.yml@main
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

  tfinit_validate_plan:
    uses: aayuORG1/project1/.github/workflows/docker-tf-plan.yml@main
    needs: [tflint, tfsec, tftest]
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}     
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

  opa-policy-evaluation:
    uses: aayuORG1/project1/.github/workflows/docker-opa-policy.yml@main
    needs: [tflint, tfsec, tftest, tfinit_validate_plan]
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
      
  manual-validation:
    needs: [opa-policy-evaluation]
    uses: aayuORG1/project1/.github/workflows/docker-tf-approve.yml@main
    with:
      environment: approval
    secrets:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      

  tf_apply:
    needs: [manual-validation]
    uses: aayuORG1/project1/.github/workflows/docker-tf-apply.yml@main
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    
  tf_destroy:
    needs: [tf_apply]
    if: github.event.inputs.action == 'destroy'
    uses: aayuORG1/project1/.github/workflows/docker-tf-destroy.yml@main
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ inputs.working_directory }}
    secrets:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

    
