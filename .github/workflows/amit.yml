name: "Terraform CI Pipeline"

on:
  push:
    branches: [develop, 'feature/**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      module_name:
        description: "Select Module"
        required: true
        default: "resource-group"
        type: choice
        options: [resource-group, subnet, terraform-bootstrap, virtual-network]

permissions:
  id-token: write
  contents: read

jobs:
  # 1. Bootstrap (Terraform Cloud Workspace Setup)
  bootstrap:
    uses: aayuORG1/project1/.github/workflows/docker-tf-cloud-bootstrap.yml@main
    with:
      organization: "HCL-TERRA-TEAM"
      environment: "dev" # या input से लें
      working_directory: "modules/${{ inputs.module_name || 'resource-group' }}"
    secrets: inherit

  # 2. Quality Checks (TFLint)
  tflint:
    needs: bootstrap
    uses: aayuORG1/project1/.github/workflows/docker-tflint.yml@main
    with:
      working_directory: "modules/${{ inputs.module_name || 'resource-group' }}"
    secrets: inherit

  # 3. Security Scan (TFSec)
  tfsec:
    needs: tflint
    uses: aayuORG1/project1/.github/workflows/docker-tfsec.yml@main
    with:
      working_directory: "modules/${{ inputs.module_name || 'resource-group' }}"
    secrets: inherit

  # 4. Terraform Plan
  plan:
    needs: tfsec
    uses: aayuORG1/project1/.github/workflows/docker-tf-plan.yml@main
    with:
      working_directory: "modules/${{ inputs.module_name || 'resource-group' }}"
    secrets: inherit

  # 5. Apply (Optional - सिर्फ main में मर्ज होने पर)
  apply:
    needs: plan
    if: github.ref == 'refs/heads/main'
    uses: aayuORG1/project1/.github/workflows/docker-tf-apply.yml@main
    with:
      working_directory: "modules/${{ inputs.module_name || 'resource-group' }}"
    secrets: inherit
