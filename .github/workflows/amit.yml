name: "Terraform CI Pipeline"

on:
  push:
    branches: [develop, 'feature/**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      module_name:
        description: "Child module name"
        required: true
        default: "resource-group"
        type: choice
        options: [resource-group, subnet, terraform-bootstrap, virtual-network]

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    uses: aayuORG1/project1/.github/workflows/docker-tf-cloud-bootstrap.yml@main
    with:
      organization: "HCL-TERRA-TEAM"
      # यहाँ environment इनपुट की कमी थी, इसे जोड़ें:
      environment: "dev" 
      working_directory: "modules/${{ inputs.module_name || 'resource-group' }}"
    secrets: inherit # 'inherit' का उपयोग करना सबसे आसान है

  validate:
    needs: bootstrap
    uses: aayuORG1/project1/.github/workflows/docker-tf-plan.yml@main
    with:
      environment: "dev"
      working_directory: "modules/${{ inputs.module_name || 'resource-group' }}"
    secrets: inherit

  tflint:
    needs: validate
    uses: aayuORG1/project1/.github/workflows/docker-tflint.yml@main
    with:
      environment: "dev"
      working_directory: "modules/${{ inputs.module_name || 'resource-group' }}"
    secrets: inherit

  trivy:
    needs: tflint
    uses: aayuORG1/project1/.github/workflows/docker-tfsec.yml@main
    with:
      environment: "dev"
      working_directory: "modules/${{ inputs.module_name || 'resource-group' }}"
    secrets: inherit

  terraform-test:
    needs: trivy
    uses: aayuORG1/project1/.github/workflows/docker-tftest.yml@main
    with:
      environment: "dev"
      working_directory: "modules/${{ inputs.module_name || 'resource-group' }}"
    secrets: inherit

  plan:
    needs: terraform-test
    uses: aayuORG1/project1/.github/workflows/docker-tf-plan.yml@main
    with:
      environment: "dev"
      working_directory: "modules/${{ inputs.module_name || 'resource-group' }}"
    secrets: inherit
