name: "Dynamic Terraform CI/CD"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "apply"
        type: choice
        options: [apply, destroy]
      environment:
        description: "Environment"
        required: true
        type: choice
        options: [dev, sit, production]

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  list-folders:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          # 1. सभी फोल्डर ढूंढें 2. .github और .git हटाएं 3. आखिरी स्लैश (/) हटाएं
          FOLDERS=$(ls -d */ | grep -vE '^\.github/|^\.git/' | sed 's/\///g' | jq -R . | jq -s -c '{folder: .}')
          echo "matrix=$FOLDERS" >> $GITHUB_OUTPUT
          echo "Generated Matrix: $FOLDERS"

  run-terraform:
    needs: [list-folders]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.list-folders.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Linting
        uses: aayuORG1/project1/.github/workflows/docker-tflint.yml@main
        with:
          environment: ${{ inputs.environment }}
          working_directory: ./${{ matrix.folder }}
        secrets: inherit

      - name: Terraform Plan
        uses: aayuORG1/project1/.github/workflows/docker-tf-plan.yml@main
        with:
          environment: ${{ inputs.environment }}
          working_directory: ./${{ matrix.folder }}
        secrets: inherit

      - name: Terraform Apply
        if: inputs.action == 'apply'
        uses: aayuORG1/project1/.github/workflows/docker-tf-apply.yml@main
        with:
          environment: ${{ inputs.environment }}
          working_directory: ./${{ matrix.folder }}
        secrets: inherit

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        uses: aayuORG1/project1/.github/workflows/docker-tf-destroy.yml@main
        with:
          environment: ${{ inputs.environment }}
          working_directory: ./${{ matrix.folder }}
        secrets: inherit
