name: "dynamic Pipeline"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "apply"
        type: choice
        options: [apply, destroy]
      environment:
        description: "Environment"
        required: true
        type: choice
        options: [dev, sit, production]

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  # 1. डायनामिक डिस्कवरी जॉब
  discover-resources:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          ENV="${{ inputs.environment }}"
          JSON_OUTPUT=$(ls -d modules/* | grep "/" | jq -R . | jq -s -c --arg env "$ENV" 'map({dir: ., ws: (. | split("/") | last + "-" + $env)})')
          echo "matrix=$JSON_OUTPUT" >> $GITHUB_OUTPUT

  # 2. tflint जॉब (अब बिल्कुल सही स्ट्रक्चर है)
  tflint:
    needs: discover-resources
    strategy:
      matrix:
        # यहाँ हम matrix डिफाइन कर रहे हैं
        resource: ${{ fromJSON(needs.discover-resources.outputs.matrix) }}
    
    # 'uses' को सीधे जॉब लेवल पर रखें (यहाँ runs-on और steps नहीं होने चाहिए)
    uses: aayuORG1/project1/.github/workflows/docker-tflint.yml@main
    with:
      environment: ${{ inputs.environment }}
      working_directory: ${{ matrix.resource.dir }}
    secrets: inherit
